# Layer: L2 流程层（部署编排）
# Contract: 构建 gptsignup 镜像；.env 与 keys 挂载在宿主机，不进 Git。
# Boundary: 本服务是批处理工具，默认不常驻；用 `docker compose run` 执行任务。
# Why: 接入同机 outlook-email-plus_default 网络，容器名直连 OEP:5000。

services:
  gptsignup:
    build:
      context: .
      dockerfile: Dockerfile
    image: gptsignup:latest
    container_name: gptsignup
    env_file:
      - .env
    environment:
      # 可被 compose run -e 覆盖；浏览器默认并发 1
      GPT_WORKERS: ${GPT_WORKERS:-1}
      GPT_TOTAL: ${GPT_TOTAL:-1}
      PROXY: ${PROXY:-}
      BROWSER_HEADLESS: ${BROWSER_HEADLESS:-0}
      BROWSER_CHANNEL: ${BROWSER_CHANNEL:-chrome}
    shm_size: "1gb"
    networks:
      - default
      - oep
    volumes:
      - ./keys:/app/keys
    # 批处理：不自动重启；镜像更新后下次 run 即用新版本
    restart: "no"
    profiles:
      - tools

networks:
  oep:
    external: true
    name: outlook-email-plus_default
